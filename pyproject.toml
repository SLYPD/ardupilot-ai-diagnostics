[tool.pytest.ini_options]
minversion = "7.0"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "S"]

[tool.bandit]
exclude_dirs = ["tests", ".claude"]
skips = ["B101"]  # assert is fine in tests
