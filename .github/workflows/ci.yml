name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate mock telemetry log
        run: python generate_mock_log.py

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

      - name: Run audit (ruff + vulture + bandit + pip-audit)
        run: python audit_codebase.py
